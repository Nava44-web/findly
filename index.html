<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findly | Private Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff3d00; --dark: #050505; --glass: rgba(255, 255, 255, 0.05);
            --c1: #ff3d00; --c2: #00e5ff; --c3: #ff007f; --c4: #7cfc00; --c5: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; overflow: hidden; }

        /* --- THE GATEKEEPER SCREEN --- */
        #authGate {
            position: fixed; inset: 0; background: var(--dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px;
        }
        .gate-logo { font-size: 50px; font-weight: 700; margin-bottom: 10px; }
        .gate-logo span { color: var(--primary); }
        .gate-sub { color: #666; margin-bottom: 40px; font-size: 14px; }
        .gate-btn { 
            background: var(--primary); color: white; padding: 18px 45px; 
            border-radius: 50px; font-weight: 700; border: none; cursor: pointer;
            font-size: 16px; box-shadow: 0 10px 30px rgba(255, 61, 0, 0.4);
            transition: 0.3s;
        }

        /* --- THE APP --- */
        #mainApp { display: none; opacity: 0; transition: 0.8s; }
        header { padding: 30px 5% 10px; background: #080808; position: sticky; top: 0; z-index: 1000; }
        .search-bar {
            width: 100%; max-width: 600px; padding: 12px 25px; border-radius: 50px;
            background: #1a1a1a; border: 2px solid transparent; color: white; outline: none;
            display: block; margin: 15px auto 0; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); }

        .cat-scroll { display: flex; gap: 12px; padding: 15px 5%; overflow-x: auto; scrollbar-width: none; }
        .cat-pill {
            padding: 8px 22px; border-radius: 50px; background: var(--glass);
            text-decoration: none; color: #777; font-size: 13px; font-weight: 600;
            white-space: nowrap; border: 1px solid transparent; transition: 0.3s;
        }
        .active-cat { color: white; border-color: var(--primary); background: rgba(255, 61, 0, 0.1); }

        .masonry { column-count: 4; column-gap: 15px; padding: 10px 5% 50px; }
        @media (max-width: 1100px) { .masonry { column-count: 3; } }
        @media (max-width: 750px) { .masonry { column-count: 2; } }

        .p-card {
            break-inside: avoid; margin-bottom: 15px; background: #111; border-radius: 20px;
            overflow: hidden; position: relative; border: 1px solid #1a1a1a; transition: 0.3s;
        }
        .p-card:hover { transform: scale(1.03); border-color: var(--primary); }
        .p-card img { width: 100%; display: block; }
        .p-hover {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7); opacity: 0;
            transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }
        .p-card:hover .p-hover { opacity: 1; }

        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 35px; color: white; cursor: pointer; z-index: 500; }
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-body { background: #111; padding: 30px; border-radius: 25px; width: 90%; max-width: 450px; border: 1px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="authGate">
        <div class="gate-logo">Find<span>ly</span></div>
        <p class="gate-sub">Access the world's smartest trending product feed.</p>
        <button class="gate-btn" id="loginBtn">Continue with Google →</button>
    </div>

    <div id="mainApp">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                <div style="font-size:24px; font-weight:700;">Find<span>ly</span></div>
                <div id="uName" style="font-size:12px; color:var(--primary); font-weight:700;">PRO ACCOUNT</div>
            </div>
            <input type="text" class="search-bar" id="pSearch" placeholder="Search curated products...">
        </header>

        <div class="cat-scroll">
            <a href="#" class="cat-pill active-cat" onclick="load('All')">All</a>
            <a href="#" class="cat-pill" onclick="load('Trending')">🔥 Trending</a>
            <a href="#" class="cat-pill" onclick="load('Tech')">💻 Tech</a>
            <a href="#" class="cat-pill" onclick="load('Fashion')">👕 Fashion</a>
            <a href="#" class="cat-pill" onclick="load('Home')">🏠 Home</a>
            <a href="#" class="cat-pill" onclick="load('Lifestyle')">🌟 Lifestyle</a>
        </div>

        <div class="masonry" id="pGrid"></div>
        <button class="fab" onclick="document.getElementById('adminModal').style.display='flex'">+</button>
    </div>

    <div id="adminModal">
        <div class="modal-body">
            <h2 style="color:var(--primary); margin-bottom:15px;">New Discovery</h2>
            <input type="text" id="pName" placeholder="Product Title">
            <input type="text" id="pLink" placeholder="Affiliate Link">
            <input type="text" id="pUrl" placeholder="Image URL (Faster)">
            <input type="file" id="pFile" accept="image/*">
            <select id="pCat">
                <option value="Trending">Trending</option>
                <option value="Tech">Tech</option>
                <option value="Fashion">Fashion</option>
                <option value="Home">Home</option>
                <option value="Lifestyle">Lifestyle</option>
            </select>
            <input type="range" id="pScore" min="0" max="10" step="0.1" value="9.5">
            <button id="saveBtn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">PUBLISH</button>
            <button onclick="document.getElementById('adminModal').style.display='none'" style="width:100%; background:none; border:none; color:#444; margin-top:10px;">Cancel</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAoTFkBa7_LvMCa2JR_nqlxSg6H82sb9rI",
        authDomain: "findly-app-8bdf6.firebaseapp.com",
        projectId: "findly-app-8bdf6",
        storageBucket: "findly-app-8bdf6.firebasestorage.app",
        messagingSenderId: "71632931005",
        appId: "1:71632931005:web:f3cdf4eb05082cedb4cfd4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('authGate').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            setTimeout(() => { document.getElementById('mainApp').style.opacity = '1'; }, 100);
            document.body.style.overflow = 'auto';
            document.getElementById('uName').innerText = user.displayName.toUpperCase();
            load('All');
        }
    });

    document.getElementById('saveBtn').onclick = async () => {
        const file = document.getElementById('pFile').files[0];
        const urlInput = document.getElementById('pUrl').value;
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Publishing...";
        let finalImg = urlInput;
        if(file) {
            const imgRef = ref(storage, `findly/${Date.now()}_${file.name}`);
            await uploadBytes(imgRef, file);
            finalImg = await getDownloadURL(imgRef);
        }
        await addDoc(collection(db, "products"), {
            name: document.getElementById('pName').value,
            link: document.getElementById('pLink').value,
            category: document.getElementById('pCat').value,
            trendScore: document.getElementById('pScore').value,
            imageUrl: finalImg,
            timestamp: Date.now()
        });
        location.reload();
    };

    async function load(catFilter) {
        const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        const grid = document.getElementById('pGrid');
        grid.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            if(catFilter !== 'All' && p.category !== catFilter) return;
            grid.innerHTML += `
                <div class="p-card">
                    <img src="${p.imageUrl}">
                    <div class="p-hover">
                        <span style="background:var(--primary); padding:2px 10px; border-radius:20px; font-size:10px; font-weight:800;">${p.trendScore} AI SCORE</span>
                        <a href="${p.link}" target="_blank" style="background:white; color:black; text-decoration:none; padding:12px; border-radius:12px; text-align:center; font-weight:700; font-size:12px;">Get Discovery →</a>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
