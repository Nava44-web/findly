<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" />

    <title>Findly 🚀 | AI Product Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #ff3d00; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; }

        /* HEADER & LOGO */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass);
        }
        .logo { font-size: 26px; font-weight: 700; display: flex; align-items: center; }
        .logo span { color: var(--primary); margin-left: 2px; font-size: 30px; }

        /* FLOATING ADD BUTTON */
        .add-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--primary); width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 61, 0, 0.3);
            z-index: 200; border: none; color: white;
        }

        /* ADMIN MODAL */
        #adminModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            border: 1px solid var(--glass);
        }
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444;
            color: white; border-radius: 8px;
        }

        /* GRID */
        .container { display: grid; grid-template-columns: 240px 1fr; gap: 20px; padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* PRODUCT CARD */
        .card {
            background: var(--glass); border-radius: 18px; padding: 15px;
            transition: 0.3s; position: relative; border: 1px solid transparent;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; }
        .score-badge {
            position: absolute; top: 25px; right: 25px;
            background: var(--primary); padding: 2px 10px; border-radius: 20px; font-weight: 700; font-size: 12px;
        }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } aside { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Findly<span>✦</span></div>
        <div id="userProfile">
            <button id="loginBtn" style="background:transparent; border:none; color:white; cursor:pointer;">Login</button>
        </div>
    </nav>

    <div class="container">
        <aside>
            <h3 style="color:var(--primary); margin-bottom:15px;">CATEGORIES</h3>
            <p style="margin:10px 0; color:#888;">🔥 Trending</p>
            <p style="margin:10px 0; color:#888;">💻 Technology</p>
            <p style="margin:10px 0; color:#888;">🏠 Home Gear</p>
        </aside>

        <main class="grid" id="productGrid">
            </main>
    </div>

    <button class="add-btn" id="openModal">+</button>

    <div id="adminModal">
        <div class="modal-content">
            <h2 style="color:var(--primary)">Add New Product</h2>
            <input type="text" id="pName" placeholder="Product Name">
            <textarea id="pDesc" placeholder="Brief Description"></textarea>
            <input type="text" id="pLink" placeholder="Amazon/Store Link">
            <label style="font-size:12px; color:#888;">Trend Score (0-10)</label>
            <input type="range" id="pScore" min="0" max="10" step="0.1">
            <label style="font-size:12px; color:#888;">Select Image from Gallery</label>
            <input type="file" id="pImage" accept="image/*">
            <button id="saveBtn" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; border-radius:8px; font-weight:700; margin-top:10px;">Upload to Findly</button>
            <button onclick="document.getElementById('adminModal').style.display='none'" style="width:100%; background:transparent; border:none; color:#888; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // CONFIG (REPLACE WITH YOURS)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // OPEN/CLOSE MODAL
        const modal = document.getElementById('adminModal');
        document.getElementById('openModal').onclick = () => modal.style.display = 'flex';

        // LOGIN
        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        onAuthStateChanged(auth, user => { if(user) document.getElementById('userProfile').innerText = user.displayName; });

        // SAVE PRODUCT
        document.getElementById('saveBtn').onclick = async () => {
            const file = document.getElementById('pImage').files[0];
            const name = document.getElementById('pName').value;
            const desc = document.getElementById('pDesc').value;
            const link = document.getElementById('pLink').value;
            const score = document.getElementById('pScore').value;

            if(!file || !name) return alert("Please add name and image!");

            // 1. Upload Image to Firebase Storage
            const imgRef = ref(storage, `products/${file.name}`);
            await uploadBytes(imgRef, file);
            const url = await getDownloadURL(imgRef);

            // 2. Save Data to Firestore
            await addDoc(collection(db, "products"), {
                name, description: desc, link, trendScore: score, imageUrl: url, timestamp: Date.now()
            });

            location.reload(); // Refresh to see new item
        };

        // LOAD PRODUCTS
        async function load() {
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const grid = document.getElementById('productGrid');
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="card">
                        <span class="score-badge">${p.trendScore} AI</span>
                        <img src="${p.imageUrl}" class="product-img">
                        <h3 style="margin-top:10px;">${p.name}</h3>
                        <p style="color:#777; font-size:13px;">${p.description}</p>
                        <a href="${p.link}" target="_blank" style="display:block; margin-top:10px; text-decoration:none; color:var(--primary); font-weight:600;">Check Details →</a>
                    </div>
                `;
            });
        }
        load();
    </script>
</body>
</html>
