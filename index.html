<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findly | Visual Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3d00; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; }

        /* HEADER & PINTEREST SEARCH */
        header {
            padding: 40px 5% 20px;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(to bottom, #111, var(--dark));
        }
        .logo-main { font-size: 32px; font-weight: 700; margin-bottom: 20px; }
        .logo-main span { color: var(--primary); }

        .search-container {
            width: 100%; max-width: 800px; position: relative;
        }
        .search-bar {
            width: 100%; padding: 18px 25px 18px 55px; border-radius: 50px;
            border: none; background: #1a1a1a; color: white; font-size: 16px;
            outline: none; border: 2px solid transparent; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); background: #222; box-shadow: 0 0 20px rgba(255, 61, 0, 0.2); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #666; font-size: 20px; }

        /* MASONRY/GRID LAYOUT */
        .layout { display: flex; gap: 20px; padding: 20px 5%; }
        aside { flex: 0 0 200px; }
        .cat-btn { 
            display: block; padding: 10px; margin-bottom: 5px; border-radius: 8px;
            text-decoration: none; color: #888; font-weight: 600; font-size: 14px;
        }
        .cat-btn:hover, .cat-active { color: white; background: var(--glass); }

        main { flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        
        /* CARD DESIGN */
        .card { background: #111; border-radius: 16px; overflow: hidden; position: relative; transition: 0.3s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; display: block; object-fit: cover; }
        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); opacity: 0; transition: 0.3s;
            display: flex; align-items: flex-end; padding: 15px;
        }
        .card:hover .card-overlay { opacity: 1; }
        .affiliate-btn {
            background: var(--primary); color: white; text-decoration: none;
            padding: 8px 15px; border-radius: 20px; font-weight: 700; font-size: 12px;
        }

        /* ADMIN MODAL */
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-body { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 30px; color: white; cursor: pointer; }

        @media (max-width: 700px) { .layout { flex-direction: column; } aside { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="logo-main">Find<span>ly</span></div>
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-bar" placeholder="Search for trending products, gadgets, fashion..." id="mainSearch">
    </div>
</header>

<div class="layout">
    <aside>
        <a href="#" class="cat-btn cat-active">For You</a>
        <a href="#" class="cat-btn">Technology</a>
        <a href="#" class="cat-btn">Fashion</a>
        <a href="#" class="cat-btn">Home</a>
        <a href="#" class="cat-btn">Lifestyle</a>
    </aside>
    <main><div class="grid" id="productGrid"></div></main>
</div>

<button class="fab" onclick="document.getElementById('adminModal').style.display='flex'">+</button>

<div id="adminModal">
    <div class="modal-body">
        <h2 style="margin-bottom:15px;">Add to <span style="color:var(--primary)">Findly</span></h2>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="text" id="pLink" placeholder="Affiliate Link">
        
        <div style="margin: 10px 0;">
            <p style="font-size:12px; color:#666;">Image Option:</p>
            <input type="text" id="pUrl" placeholder="Paste Image URL">
            <p style="text-align:center; font-size:10px; color:#444;">- OR -</p>
            <input type="file" id="pFile" accept="image/*">
        </div>

        <select id="pCat">
            <option value="Trending">Trending</option>
            <option value="Tech">Tech</option>
            <option value="Fashion">Fashion</option>
        </select>
        <button id="saveBtn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; margin-top:10px;">SAVE PRODUCT</button>
        <button onclick="document.getElementById('adminModal').style.display='none'" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Discard</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAoTFkBa7_LvMCa2JR_nqlxSg6H82sb9rI",
        authDomain: "findly-app-8bdf6.firebaseapp.com",
        projectId: "findly-app-8bdf6",
        storageBucket: "findly-app-8bdf6.firebasestorage.app",
        messagingSenderId: "71632931005",
        appId: "1:71632931005:web:f3cdf4eb05082cedb4cfd4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    document.getElementById('saveBtn').onclick = async () => {
        const name = document.getElementById('pName').value;
        const link = document.getElementById('pLink').value;
        const urlInput = document.getElementById('pUrl').value;
        const file = document.getElementById('pFile').files[0];
        let finalImageUrl = urlInput;

        if(!name || (!urlInput && !file)) return alert("Add name and image!");

        if(file) {
            const imgRef = ref(storage, `products/${Date.now()}_${file.name}`);
            await uploadBytes(imgRef, file);
            finalImageUrl = await getDownloadURL(imgRef);
        }

        await addDoc(collection(db, "products"), {
            name, link, imageUrl: finalImageUrl, timestamp: Date.now()
        });
        location.reload();
    };

    async function load() {
        const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        const grid = document.getElementById('productGrid');
        snap.forEach(doc => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.imageUrl}">
                    <div class="card-overlay">
                        <a href="${p.link}" target="_blank" class="affiliate-btn">View on Store →</a>
                    </div>
                </div>
            `;
        });
    }
    load();
</script>
</body>
</html>
