<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Findly 🚀</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f7fa;}
header{display:flex;justify-content:space-between;padding:10px;background:#fff;}
.logo{color:#ff3d00;font-weight:bold;}
button{background:#ff3d00;color:white;border:none;padding:6px 12px;border-radius:20px;}
.search{display:flex;justify-content:center;margin:15px;}
.search input{width:60%;padding:10px;border-radius:20px;text-align:center;}

.categories{display:flex;justify-content:center;gap:10px;}
.cat{background:#ff3d00;color:white;padding:5px 10px;border-radius:10px;cursor:pointer;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:10px;}
.card{background:white;padding:10px;border-radius:10px;}
.btn{display:block;background:#ff3d00;color:white;text-align:center;padding:5px;border-radius:10px;margin-top:5px;}

.popup{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5);top:0;justify-content:center;align-items:center;}
.popup-content{background:white;padding:20px;border-radius:10px;width:300px;}
input{width:100%;margin:5px 0;padding:8px;}

@media(max-width:600px){
.search input{width:90%;}
.products{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<header>
<div class="logo">Findly 🚀</div>
<div>
<button onclick="openLogin()">Login</button>
<button onclick="openSignup()">Signup</button>
<button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
<button onclick="openAdd()" id="addBtn" style="display:none;">+ Add</button>
</div>
</header>

<div class="search">
<input id="search" placeholder="Search..." oninput="searchProducts()">
</div>

<div class="categories">
<div class="cat" onclick="filterCat('All')">All</div>
<div class="cat" onclick="filterCat('Tech')">Tech</div>
<div class="cat" onclick="filterCat('Fashion')">Fashion</div>
</div>

<div class="products" id="products"></div>

<!-- LOGIN -->
<div class="popup" id="loginPopup">
<div class="popup-content">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Login with Google</button>
</div>
</div>

<!-- SIGNUP -->
<div class="popup" id="signupPopup">
<div class="popup-content">
<h3>Signup</h3>
<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">
<input id="sEmail" placeholder="Email">
<input id="sPassword" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="googleLogin()">Signup with Google</button>
</div>
</div>

<!-- ADD -->
<div class="popup" id="addPopup">
<div class="popup-content">
<h3>Add Product</h3>
<input id="img" placeholder="Image URL">
<input id="title" placeholder="Title">
<input id="link" placeholder="Buy Link">
<select id="category">
<option>Tech</option>
<option>Fashion</option>
</select>
<button onclick="addProduct()">Add</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAoTFkBa7_LvMCa2JR_nqlxSg6H82sb9rI",
authDomain: "findly-app-8bdf6.firebaseapp.com",
projectId: "findly-app-8bdf6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let products=[];

/* AUTH */
onAuthStateChanged(auth,(user)=>{
logoutBtn.style.display=user?"block":"none";
addBtn.style.display=user?"block":"none";
});

/* GOOGLE */
window.googleLogin=async()=>{
const provider=new GoogleAuthProvider();
await signInWithPopup(auth,provider);
};

/* LOGIN */
window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
loginPopup.style.display="none";
};

/* SIGNUP */
window.signup=async()=>{
await createUserWithEmailAndPassword(auth,sEmail.value,sPassword.value);
signupPopup.style.display="none";
};

/* LOGOUT */
window.logout=()=>signOut(auth);

/* ADD */
window.addProduct=async()=>{
await addDoc(collection(db,"products"),{
img:img.value,
title:title.value,
link:link.value,
category:category.value,
likes:0
});
addPopup.style.display="none";
loadProducts();
};

/* LOAD */
async function loadProducts(){
const snap=await getDocs(collection(db,"products"));
products=snap.docs.map(d=>d.data());
display(products);
}

function display(list){
productsDiv.innerHTML="";
list.forEach(p=>{
productsDiv.innerHTML+=`
<div class="card">
<img src="${p.img||'https://via.placeholder.com/150'}">
<b>${p.title}</b>
<small>🔥 Score: ${Math.floor(Math.random()*100)}</small>
<a href="${p.link}" target="_blank" class="btn">Buy</a>
</div>`;
});
}

window.searchProducts=()=>{
const val=search.value.toLowerCase();
display(products.filter(p=>p.title.toLowerCase().includes(val)));
};

window.filterCat=(cat)=>{
if(cat==="All") display(products);
else display(products.filter(p=>p.category===cat));
};

window.openLogin=()=>loginPopup.style.display="flex";
window.openSignup=()=>signupPopup.style.display="flex";
window.openAdd=()=>addPopup.style.display="flex";

const productsDiv=document.getElementById("products");

loadProducts();
</script>

</body>
</html>
