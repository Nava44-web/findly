<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findly Elite | Pro Product Discovery</title>
    
    <meta name="description" content="Findly: The elite visual discovery engine for trending AI-curated products.">
    <meta name="description" content="Findly Elite: The world's smartest AI-curated product discovery feed. Join our Pro community to find daily earning apps and viral tech trends.">
    <meta name="keywords" content="Findly, AI Product Discovery, Passive Income Apps, Trending Tech, Viral Products 2026">
    <meta name="author" content="Findly Team">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3d00; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark); color: white; overflow-x: hidden; }

        /* AUTH LOADER (Prevents Flicker) */
        #siteLoader { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .spin { width: 45px; height: 45px; border: 4px solid var(--glass); border-top-color: var(--primary); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* GATEKEEPER SCREEN */
        #authGate { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .g-logo { font-size: 55px; font-weight: 700; margin-bottom: 5px; }
        .g-logo span { color: var(--primary); }
        .g-btn { background: var(--primary); color: white; padding: 18px 50px; border-radius: 50px; font-weight: 700; border: none; cursor: pointer; font-size: 16px; margin-top: 30px; box-shadow: 0 10px 40px rgba(255, 61, 0, 0.4); transition: 0.3s; }

        /* MAIN APP UI */
        #mainApp { display: none; opacity: 0; transition: 0.6s; }
        header { padding: 25px 5% 15px; background: rgba(8,8,8,0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .pro-badge { background: var(--glass); padding: 6px 16px; border-radius: 50px; border: 1px solid rgba(255, 61, 0, 0.4); color: var(--primary); font-size: 11px; font-weight: 800; text-transform: uppercase; }

        .search-container { position: relative; width: 100%; max-width: 750px; margin: 0 auto; }
        .main-search { width: 100%; padding: 15px 25px 15px 55px; border-radius: 50px; background: #121212; border: 2px solid transparent; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .main-search:focus { border-color: var(--primary); background: #1a1a1a; }
        .search-ico { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); opacity: 0.4; }

        .categories { display: flex; gap: 12px; padding: 15px 5%; overflow-x: auto; scrollbar-width: none; }
        .cat-pill { padding: 9px 22px; border-radius: 50px; background: var(--glass); color: #777; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .cat-pill.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(255, 61, 0, 0.3); }

        /* MASONRY FEED */
        .feed { column-count: 4; column-gap: 15px; padding: 10px 5% 60px; }
        @media (max-width: 1100px) { .feed { column-count: 3; } }
        @media (max-width: 750px) { .feed { column-count: 2; } }

        .pin { break-inside: avoid; margin-bottom: 15px; background: #111; border-radius: 22px; overflow: hidden; position: relative; border: 1px solid #1a1a1a; transition: 0.4s; }
        .pin:hover { transform: scale(1.02); border-color: var(--primary); }
        .pin img { width: 100%; display: block; }
        .pin-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); opacity: 0; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .pin:hover .pin-overlay { opacity: 1; }

        /* ADMIN & FAB */
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 35px; color: white; cursor: pointer; z-index: 500; box-shadow: 0 10px 30px rgba(255, 61, 0, 0.5); }
        #adminBox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: #0f0f0f; padding: 30px; border-radius: 30px; width: 100%; max-width: 480px; border: 1px solid var(--primary); max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; background: #181818; border: 1px solid #333; color: white; border-radius: 12px; }
    </style>
    <script id="product-schema" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Findly Elite Trending Discoveries",
      "itemListElement": []
    }
    </script>
</head>
<body>

    <div id="siteLoader"><div class="spin"></div></div>

    <div id="authGate">
        <h1 class="g-logo">Find<span>ly</span></h1>
        <p style="color:#555; font-weight:600;">The Elite Visual Discovery Feed</p>
        <button class="g-btn" id="loginBtn">Continue with Google →</button>
    </div>

    <div id="mainApp">
        <header>
            <div class="top-nav">
                <div style="font-size:24px; font-weight:700;">Find<span>ly</span></div>
                <div class="pro-badge"><span id="uName">PRO MEMBER</span></div>
            </div>
            <div class="search-container">
                <span class="search-ico">🔍</span>
                <input type="text" class="main-search" id="siteSearch" placeholder="Search names, #hashtags, or keywords...">
            </div>
        </header>

        <div class="categories">
            <div class="cat-pill active" onclick="filterData('All', this)">All Discovery</div>
            <div class="cat-pill" onclick="filterData('Trending', this)">🔥 Trending</div>
            <div class="cat-pill" onclick="filterData('Tech', this)">💻 Technology</div>
            <div class="cat-pill" onclick="filterData('Fashion', this)">👕 Fashion</div>
            <div class="cat-pill" onclick="filterData('Home', this)">🏠 Smart Home</div>
            <div class="cat-pill" onclick="filterData('Lifestyle', this)">🌟 Lifestyle</div>
        </div>

        <div class="feed" id="mainFeed"></div>
        <button class="fab" onclick="document.getElementById('adminBox').style.display='flex'">+</button>
    </div>

    <div id="adminBox">
        <div class="modal">
            <h2 style="color:var(--primary); margin-bottom:10px;">New Pro Discovery</h2>
            <input type="text" id="pTitle" placeholder="Discovery Name">
            <textarea id="pAbout" placeholder="Description (SEO Search Keywords)" rows="2"></textarea>
            <input type="text" id="pTags" placeholder="Hashtags (e.g. #tech #viral)">
            <input type="text" id="pLink" placeholder="Affiliate/Buy Link">
            <input type="text" id="pUrl" placeholder="Paste Image Link (Right-click image > Copy Image Address)">
            
            <select id="pCat">
                <option value="Trending">Trending</option>
                <option value="Tech">Tech</option>
                <option value="Fashion">Fashion</option>
                <option value="Home">Home</option>
                <option value="Lifestyle">Lifestyle</option>
            </select>
            <label style="font-size:11px; color:#555;">Trend Score: <span id="sVal" style="color:var(--primary)">9.5</span></label>
            <input type="range" id="pScore" min="0" max="10" step="0.1" value="9.5" oninput="document.getElementById('sVal').innerText=this.value">
            
            <button id="pubBtn" style="width:100%; padding:16px; background:var(--primary); color:white; border:none; border-radius:14px; font-weight:700; margin-top:10px; cursor:pointer;">PUBLISH TO FEED</button>
            <button onclick="document.getElementById('adminBox').style.display='none'" style="width:100%; background:none; border:none; color:#444; margin-top:15px; cursor:pointer;">Discard</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // YOUR API KEYS
    const firebaseConfig = {
        apiKey: "AIzaSyAoTFkBa7_LvMCa2JR_nqlxSg6H82sb9rI",
        authDomain: "findly-app-8bdf6.firebaseapp.com",
        projectId: "findly-app-8bdf6",
        storageBucket: "findly-app-8bdf6.firebasestorage.app",
        messagingSenderId: "71632931005",
        appId: "1:71632931005:web:f3cdf4eb05082cedb4cfd4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // AUTH (NO FLICKER LOGIC)
    onAuthStateChanged(auth, user => {
        document.getElementById('siteLoader').style.display = 'none';
        if(user) {
            document.getElementById('authGate').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            setTimeout(() => { document.getElementById('mainApp').style.opacity = '1'; }, 50);
            document.getElementById('uName').innerText = user.displayName.toUpperCase() + " PRO";
            load('All');
        } else {
            document.getElementById('authGate').style.display = 'flex';
        }
    });

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);

    // DYNAMIC FILTERING
    window.filterData = (cat, el) => {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        load(cat);
    };

    // PRO SEARCH
    document.getElementById('siteSearch').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.pin').forEach(p => {
            const searchData = p.getAttribute('data-search').toLowerCase();
            p.style.display = searchData.includes(val) ? 'block' : 'none';
        });
    };

    // PUBLISH
    document.getElementById('pubBtn').onclick = async () => {
        const btn = document.getElementById('pubBtn');
        const imgUrl = document.getElementById('pUrl').value;
        const title = document.getElementById('pTitle').value;
        if(!imgUrl || !title) return alert("Title and Image URL are required!");

        btn.innerText = "Publishing Pro...";
        await addDoc(collection(db, "discoveries"), {
            name: title,
            desc: document.getElementById('pAbout').value,
            tags: document.getElementById('pTags').value,
            link: document.getElementById('pLink').value,
            category: document.getElementById('pCat').value,
            score: document.getElementById('pScore').value,
            imageUrl: imgUrl,
            time: Date.now()
        });
        location.reload();
    };

    // LOAD (RETRIEVES FROM FIRESTORE + UPDATES GOOGLE SEO)
    async function load(catFilter) {
        const q = query(collection(db, "discoveries"), orderBy("time", "desc"));
        const snap = await getDocs(q);
        const grid = document.getElementById('mainFeed');
        grid.innerHTML = '';

        // SEO Schema Data Object
        let schemaData = {
            "@context": "https://schema.org",
            "@type": "ItemList",
            "name": "Findly Elite Trending Discoveries",
            "itemListElement": []
        };

        snap.forEach((doc, index) => {
            const d = doc.data();
            if(catFilter !== 'All' && d.category !== catFilter) return;

            // Push each product into the SEO List for Google
            schemaData.itemListElement.push({
                "@type": "ListItem",
                "position": index + 1,
                "item": {
                    "@type": "Product",
                    "name": d.name,
                    "image": d.imageUrl,
                    "description": d.desc || d.tags,
                    "url": window.location.href
                }
            });

            grid.innerHTML += `
                <div class="pin" data-search="${d.name} ${d.tags} ${d.desc} ${d.category}">
                    <img src="${d.imageUrl}">
                    <div class="pin-overlay">
                        <div>
                            <span style="background:var(--primary); padding:3px 12px; border-radius:30px; font-size:10px; font-weight:800;">${d.score} AI SCORE</span>
                            <h3 style="font-size:15px; margin-top:12px; color:white;">${d.name}</h3>
                            <p style="font-size:11px; color:#aaa; margin-top:6px; height:34px; overflow:hidden;">${d.desc || ''}</p>
                            <p style="font-size:10px; color:var(--primary); margin-top:6px; font-weight:700;">${d.tags || ''}</p>
                        </div>
                        <a href="${d.link}" target="_blank" style="background:white; color:black; text-decoration:none; padding:12px; border-radius:14px; text-align:center; font-weight:700; font-size:12px;">Get Discovery →</a>
                    </div>
                </div>
            `;
        });

        // Tell Google the Product Data is ready
        const schemaTag = document.getElementById('product-schema');
        if(schemaTag) {
            schemaTag.innerHTML = JSON.stringify(schemaData);
        }
    }
</script>
</body>
</html>
