<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Findly</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f9f9f9;
}

/* NAVBAR */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
  flex-wrap:wrap;
}

.logo {
  font-size:22px;
  font-weight:600;
}

.logo span {
  color:#ff3d00;
}

header nav {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}

header nav input[type="text"] {
  padding:6px 10px;
  margin-right:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

button {
  background:#ff3d00;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  margin:3px;
}

/* HERO */
.hero {
  text-align:center;
  padding:30px 20px;
}

.hero h2 {
  font-size:28px;
}

.hero p {
  color:#666;
  font-size:16px;
}

/* CATEGORY BUTTONS */
#categories {
  text-align:center;
  margin-bottom:20px;
}

#formBox {
  display:none;
  padding:15px;
  margin:20px;
  background:white;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  padding:10px;
}

.title {
  font-weight:600;
  font-size:14px;
}

.desc {
  color:#777;
  font-size:12px;
}

.btn {
  display:block;
  text-align:center;
  background:#ff3d00;
  color:white;
  padding:8px;
  margin-top:10px;
  border-radius:20px;
  text-decoration:none;
  font-weight:600;
}

.score {
  color:#ff3d00;
  font-size:12px;
}

.ai-pick {
  color:green;
  font-size:12px;
  font-weight:600;
}

/* LOAD MORE BUTTON */
#loadMoreBtn {
  display:block;
  margin:20px auto;
  padding:10px 20px;
}

/* RESPONSIVE */
@media(max-width:600px){
  header nav input[type="text"]{
    width:100%;
    margin:5px 0;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Find<span>ly 🔥</span></div>
  <nav>
    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
    <button onclick="toggleForm()">+ Add Product</button>
  </nav>
</header>

<div class="hero">
  <h2>Viral Products You Didn’t Know You Needed 🔥</h2>
  <p>Discover trending items before everyone else</p>
</div>

<div id="categories">
  <button onclick="filterCategory('all')">🔥 All</button>
  <button onclick="filterCategory('gadgets')">📱 Gadgets</button>
  <button onclick="filterCategory('fashion')">👕 Fashion</button>
  <button onclick="filterCategory('useful')">💡 Useful</button>
</div>

<div id="formBox">
  <input id="img" placeholder="Image URL">
  <input id="title" placeholder="Product Title">
  <input id="desc" placeholder="Description">
  <input id="link" placeholder="Affiliate Link (Amazon/Flipkart)">
  <select id="category">
    <option value="gadgets">Gadgets</option>
    <option value="fashion">Fashion</option>
    <option value="useful">Useful</option>
  </select>
  <button onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="products"></div>
<button id="loadMoreBtn" onclick="loadMore()">Load More</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAoTFkBa7_LvMCa2JR_nqlxSg6H82sb9rI",
  authDomain: "findly-app-8bdf6.firebaseapp.com",
  projectId: "findly-app-8bdf6",
  storageBucket: "findly-app-8bdf6.firebasestorage.app",
  messagingSenderId: "71632931005",
  appId: "1:71632931005:web:f3cdf4eb05082cedb4cfd4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];
let displayedCount = 0;
const perLoad = 8;
let currentCategory = 'all';

async function addViralProducts() {
  const existing = await getDocs(collection(db, "products"));
  if(existing.size > 0) return;

  const viralProducts = [
    {img:"https://m.media-amazon.com/images/I/61EXU8BuGZL._SL1500_.jpg", title:"This ₹999 Earbud is going viral 😳", desc:"High-quality wireless earbuds with clear sound", category:"gadgets", link:"https://amzn.to/3E1Earbud"},
    {img:"https://m.media-amazon.com/images/I/71f0sFnE5ML._SL1500_.jpg", title:"Smart Watch Under ₹1500 That Everyone Wants 🔥", desc:"Track your health, steps, and calls", category:"gadgets", link:"https://amzn.to/3E1Watch"},
    {img:"https://m.media-amazon.com/images/I/71p6R5cH5zL._SL1500_.jpg", title:"LED Desk Lamp That Changes Your Mood 💡", desc:"Touch control, color changing", category:"useful", link:"https://amzn.to/3ELamp"},
    {img:"https://m.media-amazon.com/images/I/71xC6XjYQKL._SL1500_.jpg", title:"Foldable Laptop Stand For Work From Home 👌", desc:"Comfortable & portable", category:"useful", link:"https://amzn.to/3EStand"},
    {img:"https://m.media-amazon.com/images/I/81pA5dr2G7L._SL1500_.jpg", title:"Stylish Men’s Sneakers Under ₹1999 👟", desc:"Perfect for casual wear", category:"fashion", link:"https://amzn.to/3ESneakers"},
    {img:"https://m.media-amazon.com/images/I/71ReC+3v2FL._SL1500_.jpg", title:"Women’s Trendy Handbag That Turns Heads 👜", desc:"Spacious & fashionable", category:"fashion", link:"https://amzn.to/3EHandbag"},
    {img:"https://m.media-amazon.com/images/I/61f+6a4r32L._SL1500_.jpg", title:"Fast Charging Power Bank 20,000mAh ⚡", desc:"Never run out of battery", category:"gadgets", link:"https://amzn.to/3EPower"},
    {img:"https://m.media-amazon.com/images/I/71iQj2x6aPL._SL1500_.jpg", title:"Magnetic Car Phone Holder 🚗", desc:"Safe & easy navigation", category:"useful", link:"https://amzn.to/3EHolder"},
    {img:"https://m.media-amazon.com/images/I/71YB4jv+GQL._SL1500_.jpg", title:"Bluetooth Speaker That Blasts 🔊", desc:"Compact, portable, premium sound", category:"gadgets", link:"https://amzn.to/3ESpeaker"},
    {img:"https://m.media-amazon.com/images/I/71aYxLprTsL._SL1500_.jpg", title:"Multifunctional Kitchen Tool 🍳", desc:"Slice, dice, chop like a pro", category:"useful", link:"https://amzn.to/3EKitchen"},
  ];

  for(const p of viralProducts){
    await addDoc(collection(db, "products"), p);
  }
}

async function loadProducts() {
  const container = document.getElementById("products");
  if(allProducts.length === 0){
    const snapshot = await getDocs(collection(db, "products"));
    allProducts = snapshot.docs.map(doc => doc.data());
  }
  container.innerHTML = "";
  displayedCount = 0;
  loadMore();
}

function displayProducts(items){
  const container = document.getElementById("products");
  for(const p of items){
    if(currentCategory !== 'all' && p.category !== currentCategory) continue;
    const score = (Math.random() * 2 + 8).toFixed(1);
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <div class="title">${p.title}</div>
          <div class="desc">${p.desc || ""}</div>
          <div class="ai-pick">⚡ AI Pick</div>
          <div class="score">🔥 Trending Score: ${score}</div>
          <a href="${p.link || '#'}" class="btn" target="_blank">Buy Now</a>
        </div>
      </div>
    `;
  }
}

function loadMore(){
  const nextItems = allProducts.slice(displayedCount, displayedCount + perLoad);
  displayProducts(nextItems);
  displayedCount += perLoad;
  if(displayedCount >= allProducts.length){
    document.getElementById("loadMoreBtn").style.display = "none";
  } else {
    document.getElementById("loadMoreBtn").style.display = "block";
  }
}

window.toggleForm = function(){
  const f = document.getElementById("formBox");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

window.addProduct = async function(){
  const img = document.getElementById("img").value;
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value;

  if(!img || !title || !link){
    alert("Please fill required fields");
    return;
  }

  await addDoc(collection(db, "products"), {img,title,desc,link,category});
  allProducts.push({img,title,desc,link,category});
  loadProducts();
  document.getElementById("formBox").style.display = "none";
}

window.filterCategory = function(cat){
  currentCategory = cat;
  loadProducts();
}

window.searchProducts = function(){
  const term = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allProducts.filter(p=>p.title.toLowerCase().includes(term) || (p.desc && p.desc.toLowerCase().includes(term)));
  document.getElementById("products").innerHTML = "";
  displayProducts(filtered);
}

await addViralProducts();
loadProducts();

</script>

</body>
</html>
