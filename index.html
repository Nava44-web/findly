<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Findly 🔥</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f9f9f9;}
a{text-decoration:none;}
button{cursor:pointer;transition:0.3s;outline:none;}
header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;padding:15px 20px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.logo{font-size:24px;font-weight:700;color:#ff3d00;}
nav{display:flex;flex:1;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
nav input[type="text"]{padding:8px 15px;border-radius:25px;border:1px solid #ddd;width:50%;min-width:200px;}
nav button{background:linear-gradient(45deg,#ff3d00,#ff9900);color:white;border:none;padding:8px 20px;border-radius:25px;font-weight:600;}
.hero{text-align:center;padding:30px 15px;background:linear-gradient(135deg,#fff1e6,#ffe6cc);border-bottom:2px solid #ffd9b3;}
.hero h2{font-size:28px;margin-bottom:10px;color:#ff3d00;}
.hero p{color:#555;font-size:16px;}
#categories{text-align:center;margin:20px 0;}
#categories button{margin:5px;padding:8px 14px;border-radius:25px;border:none;background:linear-gradient(45deg,#ffd699,#ff6600);color:white;font-weight:600;}
#categories button:hover{background:linear-gradient(45deg,#ff3d00,#ff9900);}
#formBox{display:none;padding:15px;margin:20px auto;background:white;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);width:90%;max-width:400px;}
#formBox input,#formBox select{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:12px;}
#formBox button{width:100%;padding:12px;background:linear-gradient(45deg,#ff3d00,#ff9900);color:white;border:none;border-radius:25px;margin-top:10px;font-weight:600;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:20px;}
.card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.08);transition:0.3s;position:relative;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.15);}
.card img{width:100%;height:140px;object-fit:cover;background:#f0f0f0;border-bottom:1px solid #eee;}
.card-content{padding:12px;flex:1;display:flex;flex-direction:column;}
.title{font-weight:700;font-size:15px;color:#333;}
.desc{color:#666;font-size:13px;margin:5px 0;flex:1;}
.btn{display:block;text-align:center;background:linear-gradient(45deg,#ff3d00,#ff9900);color:white;padding:10px;border-radius:25px;font-weight:600;margin-top:10px;transition:0.3s;}
.btn:hover{opacity:0.9;}
.ai-pick{color:#00aa00;font-size:12px;font-weight:600;margin-top:2px;}
.new-badge{position:absolute;top:10px;left:10px;background:linear-gradient(45deg,#ff3d00,#ff9900);color:white;padding:3px 8px;font-size:10px;font-weight:700;border-radius:12px;}
#loadMoreBtn{display:block;margin:25px auto;padding:12px 25px;border:none;border-radius:25px;background:linear-gradient(45deg,#ff3d00,#ff9900);color:white;font-weight:600;transition:0.3s;}
#loadMoreBtn:hover{opacity:0.9;}
@media(max-width:768px){
  .products{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));}
  .card img{height:120px;}
}
@media(max-width:480px){
  .products{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;}
  .card img{height:100px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">Findly 🔥</div>
  <nav>
    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
    <button onclick="toggleForm()">+ Add Product</button>
  </nav>
</header>

<div class="hero">
  <h2>Add & Discover Products Effortlessly 🔥</h2>
  <p>Start with your own products. AI picks & trending scores auto update.</p>
</div>

<div id="categories">
  <button onclick="filterCategory('all')">🔥 All</button>
  <button onclick="filterCategory('gadgets')">📱 Gadgets</button>
  <button onclick="filterCategory('fashion')">👕 Fashion</button>
  <button onclick="filterCategory('useful')">💡 Useful</button>
</div>

<div id="formBox">
  <input id="img" placeholder="Image URL">
  <input id="title" placeholder="Product Title">
  <input id="desc" placeholder="Description">
  <input id="link" placeholder="Affiliate Link (Amazon/Flipkart)">
  <select id="category">
    <option value="gadgets">Gadgets</option>
    <option value="fashion">Fashion</option>
    <option value="useful">Useful</option>
  </select>
  <button onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="products"></div>
<button id="loadMoreBtn" onclick="loadMore()">Load More</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAoTFkBa7_LvMCa2JR_nqlxSg6H82sb9rI",
  authDomain: "findly-app-8bdf6.firebaseapp.com",
  projectId: "findly-app-8bdf6",
  storageBucket: "findly-app-8bdf6.firebasestorage.app",
  messagingSenderId: "71632931005",
  appId: "1:71632931005:web:f3cdf4eb05082cedb4cfd4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProducts = [];
let displayedCount = 0;
const perLoad = 8;
let currentCategory = 'all';
const placeholderImg = "https://via.placeholder.com/300x220?text=No+Image";

// LOAD PRODUCTS
async function loadProducts() {
  const container = document.getElementById("products");
  const snapshot = await getDocs(collection(db, "products"));
  allProducts = snapshot.docs.map(doc=>({...doc.data(), id:doc.id}));
  container.innerHTML="";
  displayedCount=0;
  loadMore();
}

function displayProducts(items){
  const container = document.getElementById("products");
  items.forEach(p=>{
    if(currentCategory!=='all' && p.category!==currentCategory) return;
    const score=(Math.random()*2+8).toFixed(1);
    const imgUrl=p.img&&p.img.length>0?p.img:placeholderImg;
    container.innerHTML+=`
      <div class="card">
        <img src="${imgUrl}" loading="lazy">
        <div class="card-content">
          <div class="title">${p.title}</div>
          <div class="desc">${p.desc||""}</div>
          <div class="ai-pick">⚡ AI Pick</div>
          <div class="score">🔥 Trending Score: ${score}</div>
          <a href="${p.link||'#'}" class="btn" target="_blank">Buy Now</a>
        </div>
      </div>
    `;
  });
}

function loadMore(){
  const nextItems = allProducts.slice(displayedCount, displayedCount+perLoad);
  displayProducts(nextItems);
  displayedCount+=perLoad;
  document.getElementById("loadMoreBtn").style.display=(displayedCount>=allProducts.length)?"none":"block";
}

// UI FUNCTIONS
window.toggleForm=function(){
  const f=document.getElementById("formBox");
  f.style.display=f.style.display==="none"?"block":"none";
}

window.addProduct=async function(){
  const img=document.getElementById("img").value;
  const title=document.getElementById("title").value;
  const desc=document.getElementById("desc").value;
  const link=document.getElementById("link").value;
  const category=document.getElementById("category").value;
  if(!img||!title||!link){alert("Please fill required fields");return;}
  await addDoc(collection(db,"products"),{img,title,desc,link,category,addedAt:serverTimestamp()});
  loadProducts();
  document.getElementById("formBox").style.display="none";
}

window.filterCategory=function(cat){
  currentCategory=cat;
  loadProducts();
}

window.searchProducts=function(){
  const term=document.getElementById("searchInput").value.toLowerCase();
  const filtered=allProducts.filter(p=>p.title.toLowerCase().includes(term)||(p.desc&&p.desc.toLowerCase().includes(term)));
  document.getElementById("products").innerHTML="";
  displayProducts(filtered);
}

// INIT
loadProducts();
</script>
</body>
</html>
